<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes nfc-wave {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-10px); opacity: 0.5; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .nfc-ring {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .nfc-ring-delay-1 { animation-delay: 1s; }
        .nfc-ring-delay-2 { animation-delay: 2s; }
        
        .glass-panel {
            background: rgba(15, 21, 36, 0.6);

            border: 1px solid rgba(125, 211, 252, 0.15);
        }

<script>
        // Simple Interaction logic to simulate NFC read
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('nfc-modal').classList.add('hidden');
            }
        });

        // Micro-interaction for the modal handle on drag simulation
        let startY;
        const modal = document.querySelector('#nfc-modal > div:last-child');
        modal.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });
        modal.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].clientY;
            const diff = currentY - startY;
            if (diff > 0) {
                modal.style.transform = `translateY(${diff}px)`;
            }
        });
        modal.addEventListener('touchend', (e) => {
            const currentY = e.changedTouches[0].clientY;
            if (currentY - startY > 150) {
                document.getElementById('nfc-modal').classList.add('hidden');
            }
            modal.style.transform = '';
        });
    </script>
